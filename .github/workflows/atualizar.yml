name: Atualizar dados do SharePoint

on:
  schedule:
    - cron: '0 * * * *'  # toda hora
  workflow_dispatch:       # permite rodar manualmente

jobs:
  exportar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install msal requests pandas openpyxl

      - name: Rodar script
        env:
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          MSAL_TOKEN_CACHE:     ${{ secrets.MSAL_TOKEN_CACHE }}
          SHAREPOINT_SHARE_LINK: ${{ secrets.SHAREPOINT_SHARE_LINK }}
          SHEET_NAME:           BASE SISTEMA
        run: python fetch_data.py

      - name: Publicar JSON no GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dados.json
          git diff --staged --quiet || git commit -m "Atualiza dados $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
