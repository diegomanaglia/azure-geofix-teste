name: Atualizar CSVs do SharePoint

on:
  schedule:
    - cron: '0 */2 * * *'  # a cada 2 horas
  workflow_dispatch:        # permite rodar manualmente

jobs:
  exportar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install msal requests pandas openpyxl PyNaCl

      - name: Gerar hospedagem_conciliado.csv
        env:
          AZURE_CLIENT_ID:                   ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:                   ${{ secrets.AZURE_TENANT_ID }}
          MSAL_TOKEN_CACHE:                  ${{ secrets.MSAL_TOKEN_CACHE }}
          SHAREPOINT_SHARE_LINK:             ${{ secrets.SHAREPOINT_SHARE_LINK }}
          SHAREPOINT_SHARE_LINK_BASE_2025:   ${{ secrets.SHAREPOINT_SHARE_LINK_BASE_2025 }}
          SHAREPOINT_SHARE_LINK_COMPLEMENTO: ${{ secrets.SHAREPOINT_SHARE_LINK_COMPLEMENTO }}
          SHEET_NAME:                        BASE NFS DE ENTRADA
          SHEET_NAME_COMPLEMENTO:            BASE SISTEMA
        run: python "01_suprimentos/00_scripts_atualizacoes/00_individuais/01_giovanna/01_hospedagem/hospedagem_conciliado_csv.py"

      - name: Atualizar cache do token no GitHub Secrets
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO:   ${{ github.repository }}
        run: python auth/update_secret.py

      - name: Publicar CSV no repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "01_suprimentos/00_scripts_atualizacoes/00_individuais/01_giovanna/01_hospedagem/hospedagem_conciliado.csv"
          git diff --staged --quiet || git commit -m "Atualiza CSV conciliado $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
